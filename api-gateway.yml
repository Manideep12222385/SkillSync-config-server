server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    discovery:
      enabled: true

    gateway:

      # ✅ GLOBAL CORS FIX
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8085"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: AUTH-SERVICE
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/**
          filters:
            - StripPrefix=1

        - id: MENTOR-SERVICE
          uri: lb://mentor-service
          predicates:
            - Path=/mentor-service/**
          filters:
            - StripPrefix=1

        - id: USER-SERVICE
          uri: lb://user-service
          predicates:
            - Path=/user-service/**
          filters:
            - StripPrefix=1

        - id: SESSION-SERVICE
          uri: lb://session-service
          predicates:
            - Path=/session-service/**
          filters:
            - StripPrefix=1

        - id: REVIEW-SERVICE
          uri: lb://review-service
          predicates:
            - Path=/review-service/**
          filters:
            - StripPrefix=1

        - id: SKILL-SERVICE
          uri: lb://skill-service
          predicates:
            - Path=/skill-service/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"

# ✅ SWAGGER AGGREGATION (WORKING)
springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    urls:
      - name: Auth Service API
        url: /auth-service/v3/api-docs
      - name: Mentor Service API
        url: /mentor-service/v3/api-docs
      - name: User Service API
        url: /user-service/v3/api-docs
      - name: Session Service API
        url: /session-service/v3/api-docs
      - name: Review Service API
        url: /review-service/v3/api-docs
      - name: Skill Service API
        url: /skill-service/v3/api-docs
