server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: mentor-service
          uri: lb://MENTOR-SERVICE
          predicates:
            - Path=/mentors/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
